<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1D3B8C">
  <title>Agenda Dental • Salud Médica Dental</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #FFFDF5; }
    h1 { font-family: 'Playfair Display', serif; }
    .card { box-shadow: 0 10px 15px -3px rgb(197 164 115 / 0.15); border-radius: 1.5rem; background: white; margin-bottom: 1rem; padding: 1.25rem; border: 1px solid rgba(197, 164, 115, 0.1); }
  </style>
</head>
<body class="pb-24">

  <div class="bg-[#FFFDF5] border-b border-[#C5A473]/30 sticky top-0 z-50 px-6 py-4 flex items-center gap-3 shadow-sm">
    <img src="logo.jpg" alt="Logo" class="h-12 w-12 object-contain rounded-xl">
    <div>
      <h1 class="text-2xl text-[#1D3B8C]">Salud Médica Dental</h1>
      <p class="text-[#C5A473] text-[10px] font-bold uppercase tracking-widest">Agenda Médica</p>
    </div>
  </div>

  <div class="max-w-xl mx-auto px-4 mt-6">
    <div id="view-hoy" class="view">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-[#1D3B8C]">Hoy</h2>
        <button onclick="showAddModal()" class="bg-[#1D3B8C] text-white px-5 py-2.5 rounded-full shadow-lg">+ Nueva cita</button>
      </div>
      <div id="list-hoy"></div>
    </div>

    <div id="view-semana" class="view hidden"><h2 class="text-2xl font-bold text-[#1D3B8C] mb-6">Semana</h2><div id="list-semana"></div></div>
    <div id="view-mes" class="view hidden"><h2 class="text-2xl font-bold text-[#1D3B8C] mb-6">Mes</h2><div id="list-mes"></div></div>
    <div id="view-pacientes" class="view hidden">
      <h2 class="text-2xl font-bold text-[#1D3B8C] mb-4">Pacientes</h2>
      <input id="search-pacientes" type="text" placeholder="Buscar nombre..." oninput="debounceSearch(this.value)" class="w-full border border-[#C5A473]/30 rounded-2xl px-5 py-3 mb-6 focus:outline-none">
      <div id="list-pacientes"></div>
    </div>
  </div>

  <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-[#C5A473]/20 max-w-xl mx-auto z-50 py-3 flex justify-around shadow-lg font-bold text-[9px] text-[#1D3B8C]">
    <button onclick="switchView('hoy')">📅 HOY</button>
    <button onclick="switchView('semana')">📆 SEMANA</button>
    <button onclick="switchView('mes')">📋 MES</button>
    <button onclick="switchView('pacientes')">👤 PACIENTES</button>
  </div>

  <div id="modal-add" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-end">
    <div class="bg-white w-full max-w-xl mx-auto rounded-t-3xl p-6 shadow-2xl" onclick="event.stopPropagation()">
      <h3 class="text-xl font-bold text-[#1D3B8C] mb-4">Nueva Cita</h3>
      <div class="space-y-3">
        <input id="input-paciente" type="text" placeholder="Nombre" class="w-full border border-[#C5A473]/30 rounded-xl px-4 py-3">
        <input id="input-telefono" type="tel" placeholder="Teléfono" class="w-full border border-[#C5A473]/30 rounded-xl px-4 py-3">
        <div class="grid grid-cols-2 gap-3">
          <input id="input-fecha" type="date" class="border border-[#C5A473]/30 rounded-xl px-4 py-3">
          <input id="input-hora" type="time" class="border border-[#C5A473]/30 rounded-xl px-4 py-3">
        </div>
        <select id="input-especialidad" class="w-full border border-[#C5A473]/30 rounded-xl px-4 py-3">
          <option value="Odontología General">Odontología General</option>
          <option value="Ortodoncia">Ortodoncia</option>
        </select>
      </div>
      <div class="flex gap-3 mt-6">
        <button onclick="hideModal()" class="flex-1 py-3 text-gray-400 font-bold uppercase text-[10px]">Cerrar</button>
        <button id="btn-save" onclick="guardarCita()" class="flex-1 py-3 bg-[#1D3B8C] text-white rounded-xl font-bold shadow-lg">GUARDAR</button>
      </div>
    </div>
  </div>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzkb5YpZB845gYW6gQLmR-kKYuMHd1jrOJoeTI6mfb7nRk0MUeyGs-QkZkjBeM5hZWH/exec';
    let appointments = [];
    let currentView = 'hoy';

    function loadData() {
      const s = document.createElement('script');
      s.src = `${WEB_APP_URL}?action=getAppointments&callback=handleData&v=${Date.now()}`;
      document.body.appendChild(s);
    }

    function handleData(res) {
      console.log("Datos:", res);
      if (res && res.success) {
        appointments = res.appointments || [];
        renderCurrentView();
      }
    }

    function renderCurrentView() {
      const hoy = new Date();
      const hoyStr = hoy.toLocaleDateString('en-CA'); // YYYY-MM-DD local
      let filtered = [];

      if (currentView === 'hoy') {
        filtered = appointments.filter(a => String(a.fecha).split('T')[0] === hoyStr);
      } else if (currentView === 'semana') {
        filtered = appointments; // Mostramos todas temporalmente para ver si aparecen
      } else if (currentView === 'mes') {
        filtered = appointments;
      } else if (currentView === 'pacientes') {
        renderPacientes(); return;
      }
      draw(filtered, 'list-' + currentView);
    }

    function draw(data, id) {
      const c = document.getElementById(id);
      if(!c) return;
      c.innerHTML = data.length === 0 ? '<p class="text-center py-10 text-gray-400">Sin datos</p>' : '';
      data.forEach(a => {
        const d = document.createElement('div');
        d.className = 'card flex justify-between items-center';
        d.innerHTML = `<div><div class="text-[#1D3B8C] font-bold">${a.paciente}</div><div class="text-gray-400 text-[10px]">${a.hora}</div></div>`;
        c.appendChild(d);
      });
    }

    function renderPacientes() {
      const c = document.getElementById('list-pacientes');
      c.innerHTML = '<p class="text-center">Cargando...</p>';
      const s = document.createElement('script');
      s.src = `${WEB_APP_URL}?action=getPatients&callback=handleP&v=${Date.now()}`;
      document.body.appendChild(s);
    }

    window.handleP = (res) => {
      const c = document.getElementById('list-pacientes');
      c.innerHTML = '';
      if(res.success) {
        res.patients.forEach(p => {
          const d = document.createElement('div');
          d.className = 'card flex justify-between items-center';
          d.innerHTML = `<div class="font-bold text-[#1D3B8C]">${p.name}</div><button onclick="document.getElementById('input-paciente').value='${p.name}'; showAddModal();" class="text-xs font-bold text-[#1D3B8C]">+ CITA</button>`;
          c.appendChild(d);
        });
      }
    };

    async function guardarCita() {
      const btn = document.getElementById('btn-save');
      const data = { paciente: document.getElementById('input-paciente').value, fecha: document.getElementById('input-fecha').value, hora: document.getElementById('input-hora').value };
      btn.disabled = true;
      await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'addAppointment', data }) });
      hideModal(); loadData(); btn.disabled = false;
    }

    function switchView(v) { currentView = v; document.querySelectorAll('.view').forEach(e => e.classList.add('hidden')); document.getElementById('view-'+v).classList.remove('hidden'); renderCurrentView(); }
    function showAddModal() { document.getElementById('modal-add').classList.remove('hidden'); }
    function hideModal() { document.getElementById('modal-add').classList.add('hidden'); }
    window.onload = loadData;
  </script>
</body>
</html>
