<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Agenda Dental • Salud Médica Dental</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #FFFDF5; color: #1D3B8C; }
    h1 { font-family: 'Playfair Display', serif; }
    .card { background: white; border-radius: 1.5rem; padding: 1.25rem; border: 1px solid rgba(197, 164, 115, 0.2); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
    .time-slot { border-bottom: 1px solid rgba(197, 164, 115, 0.1); height: 60px; position: relative; }
    .slot-occupied { background: #1D3B8C; color: white; border-radius: 0.75rem; position: absolute; left: 60px; right: 10px; top: 5px; bottom: 5px; display: flex; align-items: center; padding-left: 15px; font-size: 11px; font-weight: bold; cursor: pointer; }
    .time-label { width: 50px; font-size: 10px; font-weight: bold; color: #C5A473; text-align: right; padding-right: 10px; padding-top: 5px; }
    .view { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="pb-24">

  <div class="bg-[#FFFDF5] border-b border-[#C5A473]/30 sticky top-0 z-50 px-6 py-4 flex items-center gap-3">
    <img src="logo.jpg" alt="Logo" class="h-12 w-12 object-contain rounded-xl shadow-sm">
    <div>
      <h1 class="text-2xl text-[#1D3B8C]">Salud Médica Dental</h1>
      <p class="text-[#C5A473] text-[10px] font-bold uppercase tracking-tighter">Agenda Premium</p>
    </div>
  </div>

  <div class="max-w-xl mx-auto px-4 mt-6">
    <div id="selector-modo" class="flex bg-gray-100 rounded-2xl p-1 mb-6">
        <button id="btn-lista" onclick="toggleMode('lista')" class="flex-1 py-2 rounded-xl text-xs font-bold bg-white shadow-sm">LISTA DETALLADA</button>
        <button id="btn-cal" onclick="toggleMode('calendario')" class="flex-1 py-2 rounded-xl text-xs font-bold text-gray-400">DISPONIBILIDAD</button>
    </div>

    <div id="view-hoy" class="view">
      <div id="cont-lista-hoy" class="space-y-4"></div>
      <div id="cont-cal-hoy" class="hidden bg-white rounded-3xl p-4 border border-[#C5A473]/20 shadow-inner">
        <div id="grid-hoy"></div>
      </div>
    </div>

    <div id="view-semana" class="view hidden"><h2 class="text-2xl font-bold mb-6">Esta Semana</h2><div id="list-semana" class="space-y-4"></div></div>
    <div id="view-mes" class="view hidden"><h2 class="text-2xl font-bold mb-6">Todo el Mes</h2><div id="list-mes" class="space-y-4"></div></div>
    
    <div id="view-pacientes" class="view hidden">
      <h2 class="text-2xl font-bold mb-4">Pacientes</h2>
      <input id="search-pacientes" type="text" placeholder="Buscar nombre..." oninput="debounceSearch(this.value, true)" class="w-full border border-[#C5A473]/40 rounded-2xl px-5 py-3 mb-6 focus:outline-none focus:border-[#1D3B8C]">
      <div id="list-pacientes" class="space-y-4"></div>
    </div>
  </div>

  <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-[#C5A473]/20 max-w-xl mx-auto z-50 py-3 flex justify-around shadow-2xl">
    <button onclick="switchView('hoy')" class="flex flex-col items-center gap-1"><span class="text-xl">📅</span><span class="text-[9px] font-bold">HOY</span></button>
    <button onclick="switchView('semana')" class="flex flex-col items-center gap-1"><span class="text-xl">📆</span><span class="text-[9px] font-bold">SEMANA</span></button>
    <button onclick="switchView('mes')" class="flex flex-col items-center gap-1"><span class="text-xl">📋</span><span class="text-[9px] font-bold">TODO</span></button>
    <button onclick="switchView('pacientes')" class="flex flex-col items-center gap-1"><span class="text-xl">👤</span><span class="text-[9px] font-bold">PACIENTES</span></button>
  </div>

  <button onclick="showAddModal()" class="fixed bottom-24 right-6 bg-[#1D3B8C] text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-3xl z-40 active:scale-90 shadow-[#1D3B8C]/40">+</button>

  <div id="modal-add" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-end">
    <div class="bg-white w-full max-w-xl mx-auto rounded-t-3xl p-6 shadow-2xl" onclick="event.stopPropagation()">
      <h3 class="text-xl font-bold mb-6">Nueva Cita</h3>
      <div class="space-y-4">
        <div class="relative">
          <input id="input-paciente" type="text" placeholder="Nombre del paciente" oninput="debounceSearch(this.value, false)" class="w-full border border-[#C5A473]/30 rounded-xl px-4 py-3 focus:outline-none">
          <div id="suggestions" class="hidden absolute w-full bg-white border border-[#C5A473]/30 mt-1 rounded-xl shadow-xl max-h-40 overflow-auto z-[110]"></div>
        </div>
        <input id="input-telefono" type="tel" placeholder="Teléfono" class="w-full border border-[#C5A473]/30 rounded-xl px-4 py-3 focus:outline-none">
        <div class="grid grid-cols-2 gap-4">
          <input id="input-fecha" type="date" class="border border-[#C5A473]/30 rounded-xl px-4 py-3 focus:outline-none">
          <input id="input-hora" type="time" class="border border-[#C5A473]/30 rounded-xl px-4 py-3 focus:outline-none">
        </div>
        <select id="input-especialidad" class="w-full border border-[#C5A473]/30 rounded-xl px-4 py-3 focus:outline-none bg-white">
          <option value="Odontología General">Odontología General</option>
          <option value="Ortodoncia">Ortodoncia</option>
          <option value="Endodoncia">Endodoncia</option>
          <option value="Maxilofacial">Maxilofacial</option>
          <option value="Odontopediatría">Odontopediatría</option>
        </select>
      </div>
      <div class="flex gap-4 mt-8">
        <button onclick="hideModal()" class="flex-1 py-4 text-gray-400 font-bold text-xs uppercase">Cerrar</button>
        <button id="btn-save" onclick="guardarCita()" class="flex-1 py-4 bg-[#1D3B8C] text-white rounded-2xl font-bold shadow-lg">GUARDAR</button>
      </div>
    </div>
  </div>

  <script>
    // URL DE TU WEB APP (Asegúrate de usar la correcta)
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzkb5YpZB845gYW6gQLmR-kKYuMHd1jrOJoeTI6mfb7nRk0MUeyGs-QkZkjBeM5hZWH/exec';

    let appointments = [];
    let currentView = 'hoy';
    let currentMode = 'lista';

    function getTodayStr() {
      return new Date().toLocaleDateString('en-CA'); 
    }

    // Normaliza fechas que vienen de Google Sheets
    function normalize(f) {
      if(!f) return "";
      return String(f).split('T')[0];
    }

    function loadData() {
      const s = document.createElement('script');
      s.src = `${WEB_APP_URL}?action=getAppointments&callback=handleData&v=${Date.now()}`;
      document.body.appendChild(s);
    }

    function handleData(res) {
      if (res && res.success) {
        appointments = res.appointments || [];
        renderCurrentView();
      }
    }

    function renderCurrentView() {
      const hoyStr = getTodayStr();
      let data = [];

      if (currentView === 'hoy') {
        data = appointments.filter(a => normalize(a.fecha) === hoyStr);
        renderCalendarGrid(data);
        drawList('cont-lista-hoy', data);
      } else if (currentView === 'semana') {
        const limite = new Date();
        limite.setDate(new Date().getDate() + 7);
        const limiteStr = limite.toLocaleDateString('en-CA');
        data = appointments.filter(a => normalize(a.fecha) >= hoyStr && normalize(a.fecha) <= limiteStr);
        drawList('list-semana', data);
      } else if (currentView === 'mes') {
        const mesActual = new Date().getMonth();
        data = appointments.filter(a => new Date(normalize(a.fecha) + "T12:00:00").getMonth() === mesActual);
        drawList('list-mes', data);
      } else if (currentView === 'pacientes') {
        renderPacientes();
      }
    }

    function renderCalendarGrid(data) {
      const grid = document.getElementById('grid-hoy');
      grid.innerHTML = '';
      const horas = ["08:00","09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00","20:00"];
      horas.forEach(h => {
        const row = document.createElement('div');
        row.className = 'time-slot flex';
        // Buscamos si hay cita en esa hora específica
        const cita = data.find(a => String(a.hora).startsWith(h.split(':')[0]));
        row.innerHTML = `<div class="time-label">${h}</div>`;
        if (cita) {
          row.innerHTML += `<div class="slot-occupied" onclick="alert('Paciente: ${cita.paciente}\\nEspecialidad: ${cita.especialidad}')">${cita.paciente}</div>`;
        }
        grid.appendChild(row);
      });
    }

    function drawList(id, data) {
      const c = document.getElementById(id);
      if(!c) return;
      c.innerHTML = data.length === 0 ? '<div class="text-center py-20 text-[#C5A473]/50 font-medium italic">No hay citas registradas</div>' : '';
      data.sort((a,b) => String(a.hora).localeCompare(String(b.hora))).forEach(a => {
        const d = document.createElement('div');
        d.className = 'card flex items-center justify-between mb-4';
        d.innerHTML = `<div><div class="font-bold text-lg">${a.paciente}</div><div class="text-[#C5A473] text-[10px] font-bold uppercase">${a.especialidad || 'General'}</div><div class="text-gray-400 text-[10px] mt-1">${normalize(a.fecha)} • ${a.hora}</div></div>
                       <button onclick="eliminarCita('${a.id}')" class="text-red-200 p-2 text-xl">✕</button>`;
        c.appendChild(d);
      });
    }

    function toggleMode(mode) {
      currentMode = mode;
      document.getElementById('cont-lista-hoy').classList.toggle('hidden', mode !== 'lista');
      document.getElementById('cont-cal-hoy').classList.toggle('hidden', mode !== 'calendario');
      document.getElementById('btn-lista').className = mode === 'lista' ? "flex-1 py-2 rounded-xl text-xs font-bold bg-white shadow-sm" : "flex-1 py-2 rounded-xl text-xs font-bold text-gray-400";
      document.getElementById('btn-cal').className = mode === 'calendario' ? "flex-1 py-2 rounded-xl text-xs font-bold bg-white shadow-sm" : "flex-1 py-2 rounded-xl text-xs font-bold text-gray-400";
    }

    function renderPacientes() {
      const c = document.getElementById('list-pacientes');
      c.innerHTML = '<div class="text-center py-10 italic">Cargando pacientes...</div>';
      const s = document.createElement('script');
      s.src = `${WEB_APP_URL}?action=getPatients&callback=handleP&v=${Date.now()}`;
      document.body.appendChild(s);
    }

    window.handleP = (res) => {
      const c = document.getElementById('list-pacientes');
      c.innerHTML = '';
      if(res.success) {
        res.patients.forEach(p => {
          const d = document.createElement('div');
          d.className = 'card flex justify-between items-center mb-4';
          d.innerHTML = `<div><div class="font-bold">${p.name}</div><div class="text-[9px] text-gray-400 uppercase font-bold">Última: ${normalize(p.lastFecha)}</div></div>
                         <button onclick="document.getElementById('input-paciente').value='${p.name}'; document.getElementById('input-telefono').value='${p.telefono}'; showAddModal();" class="text-[#1D3B8C] font-bold text-[10px] bg-[#1D3B8C]/5 px-4 py-2 rounded-xl">+ CITA</button>`;
          c.appendChild(d);
        });
      }
    };

    async function guardarCita() {
      const btn = document.getElementById('btn-save');
      const data = { 
        paciente: document.getElementById('input-paciente').value, 
        telefono: document.getElementById('input-telefono').value, 
        fecha: document.getElementById('input-fecha').value, 
        hora: document.getElementById('input-hora').value, 
        especialidad: document.getElementById('input-especialidad').value 
      };
      if (!data.paciente || !data.fecha || !data.hora) return alert('Por favor, llena los campos básicos');
      btn.disabled = true; btn.innerHTML = "Guardando...";
      try {
        const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'addAppointment', data }) }).then(r => r.json());
        if (res.success) { hideModal(); loadData(); }
      } catch (e) { alert('Error al guardar'); }
      btn.disabled = false; btn.innerHTML = "GUARDAR";
    }

    async function eliminarCita(id) {
      if (!confirm('¿Seguro que deseas eliminar esta cita?')) return;
      try {
        await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteAppointment', data: { id } }) }).then(r => r.json());
        loadData();
      } catch (e) { alert('Error al eliminar'); }
    }

    function switchView(v) { 
      currentView = v; 
      document.querySelectorAll('.view').forEach(e => e.classList.add('hidden')); 
      document.getElementById('view-'+v).classList.remove('hidden'); 
      // El selector de modo solo se ve en la vista de HOY
      document.getElementById('selector-modo').classList.toggle('hidden', v !== 'hoy');
      renderCurrentView(); 
    }

    function showAddModal() { 
      document.getElementById('modal-add').classList.remove('hidden'); 
      document.getElementById('input-fecha').value = getTodayStr(); 
    }

    function hideModal() { 
      document.getElementById('modal-add').classList.add('hidden'); 
      document.getElementById('suggestions').classList.add('hidden');
    }

    function debounceSearch(q, isMainSearch) { 
      clearTimeout(window.t); 
      if(q.length < 2) { 
        if(!isMainSearch) document.getElementById('suggestions').classList.add('hidden'); 
        return; 
      }
      window.t = setTimeout(() => {
        const s = document.createElement('script');
        s.src = `${WEB_APP_URL}?action=searchPatients&query=${q}&callback=hS`;
        document.body.appendChild(s);
      }, 400);
    }

    window.hS = (res) => {
      const sug = document.getElementById('suggestions'); 
      sug.innerHTML = '';
      if(res.success && res.patients.length > 0) {
        sug.classList.remove('hidden');
        res.patients.forEach(p => {
          const d = document.createElement('div'); 
          d.className = 'p-3 hover:bg-gray-50 cursor-pointer border-b text-sm font-medium'; 
          d.innerHTML = p.name;
          d.onclick = () => { 
            document.getElementById('input-paciente').value = p.name; 
            document.getElementById('input-telefono').value = p.telefono; 
            sug.classList.add('hidden'); 
          };
          sug.appendChild(d);
        });
      }
    };

    window.onload = loadData;
  </script>
</body>
</html>
