<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1D3B8C">
  <title>Agenda Dental • Salud Médica Dental</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #FFFDF5; }
    h1 { font-family: 'Playfair Display', serif; }
    .card { box-shadow: 0 10px 15px -3px rgb(197 164 115 / 0.15); border-radius: 1.5rem; }
    .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #1D3B8C; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="pb-20">

  <div class="bg-[#FFFDF5] border-b border-[#C5A473]/30 sticky top-0 z-50">
    <div class="max-w-xl mx-auto px-6 py-4 flex items-center gap-3">
      <img src="logo.jpg" alt="Logo" class="h-12 w-12 object-contain rounded-xl">
      <div>
        <h1 class="text-2xl text-[#1D3B8C]">Salud Médica Dental</h1>
        <p class="text-[#C5A473] text-xs font-medium uppercase tracking-widest">Agenda Médica</p>
      </div>
    </div>
  </div>

  <div class="max-w-xl mx-auto px-4 mt-4">
    <div id="view-hoy" class="view">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-[#1D3B8C]">Hoy</h2>
        <button onclick="showAddModal()" class="bg-[#1D3B8C] text-white px-5 py-2.5 rounded-full shadow-lg active:scale-95 text-sm font-bold">+ Nueva cita</button>
      </div>
      <div id="list-hoy" class="space-y-4"></div>
    </div>

    <div id="view-semana" class="view hidden">
      <h2 class="text-2xl font-bold text-[#1D3B8C] mb-6">Esta semana</h2>
      <div id="list-semana" class="space-y-4"></div>
    </div>

    <div id="view-mes" class="view hidden">
      <h2 class="text-2xl font-bold text-[#1D3B8C] mb-6">Este mes</h2>
      <div id="list-mes" class="space-y-4"></div>
    </div>

    <div id="view-pacientes" class="view hidden">
      <h2 class="text-2xl font-bold text-[#1D3B8C] mb-4">Pacientes</h2>
      <input id="search-pacientes" type="text" placeholder="Buscar nombre..." oninput="debounceSearch(this.value)"
             class="w-full border border-[#C5A473]/30 rounded-2xl px-5 py-3 mb-6 focus:outline-none focus:border-[#1D3B8C]">
      <div id="list-pacientes" class="space-y-4"></div>
    </div>
  </div>

  <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-[#C5A473]/20 max-w-xl mx-auto z-50 py-2 flex justify-around font-bold text-[10px] text-[#1D3B8C]">
    <button onclick="switchView('hoy')" class="flex flex-col items-center"><span class="text-xl">📅</span>HOY</button>
    <button onclick="switchView('semana')" class="flex flex-col items-center"><span class="text-xl">📆</span>SEMANA</button>
    <button onclick="switchView('mes')" class="flex flex-col items-center"><span class="text-xl">📋</span>MES</button>
    <button onclick="switchView('pacientes')" class="flex flex-col items-center"><span class="text-xl">👤</span>PACIENTES</button>
  </div>

  <div id="modal-add" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-end" onclick="if(event.target===this)hideModal()">
    <div class="bg-white w-full max-w-xl mx-auto rounded-t-3xl p-6 shadow-2xl" onclick="event.stopPropagation()">
      <h3 class="text-xl font-bold text-[#1D3B8C] mb-6">Registrar Cita</h3>
      <div class="space-y-4">
        <div class="relative">
          <input id="input-paciente" type="text" placeholder="Nombre del paciente" oninput="debounceSearch(this.value)"
                 class="w-full border border-[#C5A473]/30 rounded-xl px-4 py-3 focus:outline-none">
          <div id="suggestions" class="hidden absolute w-full bg-white border border-[#C5A473]/20 mt-1 rounded-xl shadow-xl max-h-40 overflow-auto z-[110]"></div>
        </div>
        <input id="input-telefono" type="tel" placeholder="Teléfono" class="w-full border border-[#C5A473]/30 rounded-xl px-4 py-3 focus:outline-none">
        <div class="grid grid-cols-2 gap-4">
          <input id="input-fecha" type="date" class="border border-[#C5A473]/30 rounded-xl px-4 py-3">
          <input id="input-hora" type="time" class="border border-[#C5A473]/30 rounded-xl px-4 py-3">
        </div>
        <select id="input-especialidad" class="w-full border border-[#C5A473]/30 rounded-xl px-4 py-3 focus:outline-none">
          <option value="Odontología General">Odontología General</option>
          <option value="Ortodoncia">Ortodoncia</option>
          <option value="Endodoncia">Endodoncia</option>
          <option value="Maxilofacial">Maxilofacial</option>
          <option value="Odontopediatría">Odontopediatría</option>
        </select>
      </div>
      <div class="flex gap-4 mt-8">
        <button onclick="hideModal()" class="flex-1 py-3 text-gray-500 font-bold">CANCELAR</button>
        <button id="btn-save" onclick="guardarCita()" class="flex-1 py-3 bg-[#1D3B8C] text-white rounded-xl font-bold">GUARDAR</button>
      </div>
    </div>
  </div>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzkb5YpZB845gYW6gQLmR-kKYuMHd1jrOJoeTI6mfb7nRk0MUeyGs-QkZkjBeM5hZWH/exec';
    let appointments = [];
    let currentView = 'hoy';
    let debounceTimer = null;

    function loadData() {
      const script = document.createElement('script');
      script.src = `${WEB_APP_URL}?action=getAppointments&callback=handleData&v=${new Date().getTime()}`;
      document.body.appendChild(script);
    }

    function handleData(res) {
      console.log("Datos recibidos:", res);
      if (res && res.success) {
        appointments = (res.appointments || []).map(a => ({
          ...a,
          fechaLimpia: String(a.fecha).split('T')[0]
        }));
        renderCurrentView();
      }
      cleanupScripts('handleData');
    }

    function renderCurrentView() {
      const hoy = new Date();
      const offset = hoy.getTimezoneOffset() * 60000;
      const hoyStr = new Date(hoy - offset).toISOString().split('T')[0];
      let filtered = [];

      if (currentView === 'hoy') {
        filtered = appointments.filter(a => a.fechaLimpia === hoyStr);
      } else if (currentView === 'semana') {
        const limite = new Date();
        limite.setDate(hoy.getDate() + 7);
        const limiteStr = new Date(limite - offset).toISOString().split('T')[0];
        filtered = appointments.filter(a => a.fechaLimpia >= hoyStr && a.fechaLimpia <= limiteStr);
      } else if (currentView === 'mes') {
        const mesActual = hoy.getMonth();
        const añoActual = hoy.getFullYear();
        filtered = appointments.filter(a => {
          const d = new Date(a.fecha);
          return d.getMonth() === mesActual && d.getFullYear() === añoActual;
        });
      } else if (currentView === 'pacientes') {
        renderPacientes();
        return;
      }
      renderList('list-' + currentView, filtered);
    }

    function renderList(containerId, list) {
      const container = document.getElementById(containerId);
      if (!container) return;
      container.innerHTML = list.length === 0 ? '<div class="text-center py-12 text-[#C5A473]">No hay citas registradas</div>' : '';
      list.sort((a,b) => a.hora.localeCompare(b.hora)).forEach(app => {
        const div = document.createElement('div');
        div.className = 'card bg-white p-5 flex items-center justify-between border border-[#C5A473]/10 mb-4';
        div.innerHTML = `<div><div class="text-[#1D3B8C] font-bold text-lg">${app.paciente}</div><div class="text-[#C5A473] text-xs font-medium uppercase">${app.especialidad}</div><div class="text-gray-400 text-[10px] mt-1">${formatDate(app.fecha)} • ${app.hora}</div></div><button onclick="eliminarCita('${app.id}')" class="text-red-300 px-2 text-xl">✕</button>`;
        container.appendChild(div);
      });
    }

    function renderPacientes() {
      const container = document.getElementById('list-pacientes');
      container.innerHTML = '<div class="loading-spinner mx-auto mt-10"></div>';
      const script = document.createElement('script');
      script.src = `${WEB_APP_URL}?action=getPatients&callback=handlePatients&v=${new Date().getTime()}`;
      document.body.appendChild(script);
    }

    function handlePatients(res) {
      const container = document.getElementById('list-pacientes');
      container.innerHTML = '';
      if (res.success) {
        res.patients.forEach(p => {
          const div = document.createElement('div');
          div.className = 'card bg-white p-5 flex justify-between items-center border border-[#C5A473]/10';
          div.innerHTML = `<div><div class="font-bold text-[#1D3B8C]">${p.name}</div><div class="text-[10px] text-gray-400 font-bold uppercase">Última: ${formatDate(p.lastFecha)}</div></div><button onclick="document.getElementById('input-paciente').value='${p.name}'; showAddModal();" class="bg-[#1D3B8C]/5 text-[#1D3B8C] px-4 py-2 rounded-xl font-bold text-xs">+ CITA</button>`;
          container.appendChild(div);
        });
      }
      cleanupScripts('handlePatients');
    }

    function debounceSearch(q) {
      clearTimeout(debounceTimer);
      if (q.length < 2) { document.getElementById('suggestions').classList.add('hidden'); return; }
      debounceTimer = setTimeout(() => {
        const script = document.createElement('script');
        script.src = `${WEB_APP_URL}?action=searchPatients&query=${q}&callback=handleSearch`;
        document.body.appendChild(script);
      }, 400);
    }

    function handleSearch(res) {
      const sug = document.getElementById('suggestions');
      sug.innerHTML = '';
      if (res.success && res.patients.length > 0) {
        sug.classList.remove('hidden');
        res.patients.forEach(p => {
          const d = document.createElement('div');
          d.className = 'p-3 hover:bg-gray-50 cursor-pointer border-b text-sm font-medium';
          d.innerHTML = p.name;
          d.onclick = () => { document.getElementById('input-paciente').value = p.name; sug.classList.add('hidden'); };
          sug.appendChild(d);
        });
      }
      cleanupScripts('handleSearch');
    }

    async function guardarCita() {
      const btn = document.getElementById('btn-save');
      const data = { paciente: document.getElementById('input-paciente').value, telefono: document.getElementById('input-telefono').value, fecha: document.getElementById('input-fecha').value, hora: document.getElementById('input-hora').value, especialidad: document.getElementById('input-especialidad').value };
      if (!data.paciente || !data.fecha || !data.hora) return alert('Completa los campos obligatorios');
      btn.disabled = true; btn.innerHTML = "...";
      try {
        const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'addAppointment', data }) }).then(r => r.json());
        if (res.success) { hideModal(); loadData(); }
      } catch (e) { alert('Error al guardar'); }
      btn.disabled = false; btn.innerHTML = "GUARDAR";
    }

    async function eliminarCita(id) {
      if (!confirm('¿Eliminar cita?')) return;
      try {
        await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteAppointment', data: { id } }) });
        loadData();
      } catch (e) { alert('Error al eliminar'); }
    }

    function switchView(v) { currentView = v; document.querySelectorAll('.view').forEach(e => e.classList.add('hidden')); document.getElementById('view-'+v).classList.remove('hidden'); renderCurrentView(); }
    function showAddModal() { document.getElementById('modal-add').classList.remove('hidden'); document.getElementById('input-fecha').value = new Date().toISOString().split('T')[0]; }
    function hideModal() { document.getElementById('modal-add').classList.add('hidden'); }
    function formatDate(f) { if(!f) return ''; const d = new Date(f); return d.toLocaleDateString('es-MX', {day:'2-digit', month:'2-digit', year:'numeric'}); }
    function cleanupScripts(name) { const scripts = document.querySelectorAll(`script[src*="callback=${name}"]`); scripts.forEach(s => s.remove()); }

    window.onload = loadData;
  </script>
</body>
</html>
